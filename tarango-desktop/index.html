<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarango — IPTV Player</title>
  <meta name="description" content="Tarango Desktop IPTV Player — Lightweight, fast channel browsing with HLS streaming">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Custom Title Bar (Discord/WhatsApp style) -->
  <div id="titlebar">
    <div id="titlebar-brand">
      <div class="brand-icon">T</div>
      <span>Tarango</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg viewBox="0 0 16 16"><rect x="3" y="7.5" width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="titlebar-btn close" id="btn-close" title="Close">
        <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-title">তরঙ্গ</div>
    <div class="splash-subtitle">TARANGO IPTV PLAYER</div>
    <div class="splash-spinner"></div>
  </div>

  <!-- Main App -->
  <div id="app">
    <!-- Header: brand + search + source + actions -->
    <div id="header">
      <div class="brand-text">তরঙ্গ</div>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-box" placeholder="Search channels..." autocomplete="off" spellcheck="false">
      </div>
      <span class="header-label">Source</span>
      <select id="source-select"></select>
      <button class="header-btn" id="btn-add-source" title="Add / Manage Sources">＋</button>
      <button class="header-btn" id="btn-favorites" title="Favourites">★</button>
    </div>

    <!-- Category chips -->
    <div id="category-bar"></div>

    <!-- Channel grid -->
    <div id="grid-container">
      <div id="channel-grid"></div>
    </div>

    <!-- Status / empty state -->
    <div id="status-text"></div>
  </div>

  <!-- Fullscreen Player Overlay -->
  <div id="player-overlay">
    <video id="player-video" autoplay></video>
    <div class="player-banner" id="player-banner"></div>
    <div class="player-number-entry" id="player-number"></div>
    <div class="player-status" id="player-status"></div>
    <button class="player-back-btn" id="player-back" title="Back to channels">✕</button>
    <div class="player-channel-bar" id="player-channel-bar">
      <img class="player-ch-logo" id="player-ch-logo" alt="">
      <div>
        <div class="player-ch-name" id="player-ch-name"></div>
        <div class="player-ch-group" id="player-ch-group"></div>
      </div>
    </div>
    <div class="player-controls-hint">
      <span class="hint-key"><kbd>↑</kbd> Prev</span>
      <span class="hint-key"><kbd>↓</kbd> Next</span>
      <span class="hint-key"><kbd>0-9</kbd> Jump</span>
      <span class="hint-key"><kbd>Esc</kbd> Back</span>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Manage Sources Modal -->
  <div class="modal-backdrop" id="modal-sources">
    <div class="modal">
      <div class="modal-title">Add / Manage Sources</div>
      <input type="text" class="modal-input" id="input-source-name" placeholder="Source name (e.g. My Channels)">
      <input type="text" class="modal-input" id="input-source-url" placeholder="Playlist URL (http:// or https://)">
      <div class="modal-buttons">
        <button class="modal-btn primary" id="btn-add-source-confirm">Add Source</button>
        <button class="modal-btn" id="btn-sources-close">Close</button>
      </div>
      <div class="modal-divider"></div>
      <div id="custom-sources-list"></div>
    </div>
  </div>

  <!-- Confirm Dialog -->
  <div class="modal-backdrop confirm-modal" id="modal-confirm">
    <div class="modal">
      <div class="modal-title" id="confirm-title">Confirm</div>
      <div class="confirm-message" id="confirm-message"></div>
      <div class="modal-buttons">
        <button class="modal-btn primary" id="confirm-yes">Yes</button>
        <button class="modal-btn" id="confirm-no">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
